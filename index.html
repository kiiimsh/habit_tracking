<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracking - 습관 관리의 시작</title>
    <meta name="description" content="깨끗하고 직관적인 습관 관리 도구로 더 나은 나를 만드세요.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1 class="logo">&lt; Title &gt;</h1>
            <div class="year-month" id="yearMonthDisplay">YYYY.MM</div>
        </header>

        <main class="content">
            <!-- Date Selector & Habit List Section -->
            <section class="card habit-list-card">
                <div class="card-header">
                    <div class="date-selector-wrapper">
                        <label for="dateSelector" class="date-label">기록 날짜 (지정)</label>
                        <input type="date" id="dateSelector" class="date-selector">
                    </div>
                    <button class="btn-icon" id="toggleAddHabitBtn" aria-label="습관 추가">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
                
                <!-- Hidden Add Habit Form -->
                <div id="addHabitContainer" class="add-habit-container hidden">
                    <form id="habitForm" class="habit-form">
                        <input type="text" id="habitInput" placeholder="새로운 습관을 입력하세요 (예: 운동, 독서)" required>
                        <button type="submit" class="btn btn-primary" id="addHabitBtn">추가</button>
                    </form>
                </div>

                <div class="list-header">
                    <h3>습관 List</h3>
                    <span class="badge" id="habitCount">0개</span>
                </div>
                <ul id="habitList" class="habit-list">
                    <!-- Habits will be injected here -->
                </ul>
            </section>

            <!-- Monthly Grid Section -->
            <section class="card grid-card">
                <div class="grid-container" id="monthlyGridContainer">
                    <div class="grid-loading">데이터를 불러오는 중...</div>
                    <!-- Table will be injected here -->
                </div>
            </section>

            <!-- Visualization Section -->
            <section class="card visualization-card">
                <div class="card-header">
                    <h2 class="card-title">graph</h2>
                </div>
                <div class="chart-container">
                    <div id="chartLoading" class="chart-loading">데이터를 불러오는 중...</div>
                    <div class="svg-wrapper" id="svgWrapper">
                        <!-- Y-axis label added via CSS or SVG text -->
                        <div class="y-axis-label">체크<br>갯수</div>
                        <svg id="achievementChart" viewBox="0 0 800 300" preserveAspectRatio="xMidYMid meet"></svg>
                        <div class="x-axis-label">일</div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Habit Tracking Prototype. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
