<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracking - 습관 관리의 시작</title>
    <meta name="description" content="깨끗하고 직관적인 습관 관리 도구로 더 나은 나를 만드세요.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <!-- 사용자가 직접 클릭하여 서비스명을 수정할 수 있도록 contenteditable 속성 추가 -->
            <h1 class="logo" id="serviceTitle" contenteditable="true" spellcheck="false">Habit Tracking</h1>
            <div class="year-month" id="yearMonthDisplay">YYYY.MM</div>
        </header>

        <main class="content">
            <!-- Date Selector & Habit List Section -->
            <section class="card habit-list-card">
                <div class="card-header">
                    <div class="date-selector-wrapper">
                        <label for="dateSelector" class="date-label">기록 날짜 (지정)</label>
                        <input type="date" id="dateSelector" class="date-selector">
                    </div>
                    <button class="btn-icon" id="openModalBtn" aria-label="습관 관리">
                        <!-- 연필 아이콘 (Edit Icon)으로 교체 -->
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                    </button>
                </div>
                
                <div class="list-header">
                    <h3>습관 List</h3>
                    <span class="badge" id="habitCount">0개</span>
                </div>
                <ul id="habitList" class="habit-list">
                    <!-- Habits will be injected here -->
                </ul>
            </section>

            <!-- Monthly Grid Section -->
            <section class="card grid-card">
                <div class="grid-container" id="monthlyGridContainer">
                    <div class="grid-loading">데이터를 불러오는 중...</div>
                    <!-- Table will be injected here -->
                </div>
            </section>

            <!-- Visualization Section -->
            <section class="card visualization-card">
                <div class="card-header">
                    <h2 class="card-title">graph</h2>
                </div>
                <div class="chart-container">
                    <div id="chartLoading" class="chart-loading">데이터를 불러오는 중...</div>
                    <div class="svg-wrapper" id="svgWrapper">
                        <!-- Y-axis label added via CSS or SVG text -->
                        <div class="y-axis-label">체크<br>갯수</div>
                        <svg id="achievementChart" viewBox="0 0 800 300" preserveAspectRatio="xMidYMid meet"></svg>
                        <div class="x-axis-label">일</div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Habit Tracking Prototype. All rights reserved.</p>
        </footer>
    </div>

    <!-- 습관 관리 모달 (Habit Management Modal) -->
    <div id="habitModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>습관 관리</h2>
                <button id="closeModalBtn" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 습관 추가 폼 (모달 내부) -->
                <form id="modalHabitForm" class="habit-form">
                    <input type="text" id="modalHabitInput" placeholder="새로운 습관을 입력하세요" required>
                    <button type="submit" class="btn btn-primary">추가</button>
                </form>

                <div class="modal-list-container">
                    <ul id="modalHabitList" class="manage-habit-list">
                        <!-- 습관 편집 리스트가 여기에 주입됩니다 -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
